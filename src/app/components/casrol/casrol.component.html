<div class="carousel-container1"
     (mouseenter)="pause()"
     (mouseleave)="resume()"

     (mousedown)="onDragStart($event)"
     (mousemove)="onDragMove($event)"
     (mouseup)="onDragEnd()"
     (mouseleave)="onDragEnd()"

     (touchstart)="onDragStart($event)"
     (touchmove)="onDragMove($event)"
     (touchend)="onDragEnd()">

  <div class="carousel-wrapper1"
       [ngStyle]="{ 'transform': 'translateX(' + currentTranslate + 'px)' }">

    <div class="carousel-item1"
         *ngFor="let image of loopImages" style="background: #484848;">

      <img [src]="image.image ? base_url + image.image : 'assets/images/profile.png'"
           style="width: 100%;
  height: 590px;
  opacity: 0.7;
  object-fit: cover;
  object-position: top;
">
    </div>

  </div>

  <!-- Buttons -->
  <button class="prev" (click)="currentIndex = currentIndex - 1; setPositionByIndex()">❮</button>
  <button class="next" (click)="currentIndex = currentIndex + 1; setPositionByIndex()">❯</button>

  <!-- Indicators -->
  <div class="indicators1">
    <span *ngFor="let image of images; let i = index"
          (click)="currentIndex = i + 1; setPositionByIndex()"
          [class.active]="i === (currentIndex - 1)">
    </span>
  </div>

</div>
