<div class="app-main__inner" [ngClass]="{ 'display-area-shrink': sideNavStatus }">

  <!-- 🔥 Carousel FULL TOP (no spacing) -->
  <div class="casrol-wrapper">
    <app-casrol></app-casrol>
  </div>

  <!-- बाकी content -->
  <div class="main-content">
    
    <h2 class="heading-glass">
      Upcoming Events
    </h2>

    <div class="event-scroll">
      <div *ngFor="let item of program_data" class="event-card">

        <img
          [src]="item.image ? base_url + item.image : 'assets/images/profile.png'"
        />

        <div class="event-content">
          <div class="event-title">{{ item.title }}</div>
          <p class="event-desc">{{ item.detail }}</p>
        </div>

      </div>
    </div>

  </div>
</div>
